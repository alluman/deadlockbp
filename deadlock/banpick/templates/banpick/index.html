<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
</head>
<body>
    <h1>Welcome to the BanPick System</h1>
    <button id="create-room">Create a New Room</button>

    <div id="room-link" style="margin-top: 20px;"></div>

    <script>
        document.getElementById('create-room').addEventListener('click', function () {
            // 난수 생성 (방 ID로 사용)
            const roomId = Math.random().toString(36).substring(2, 12);

            // 방 URL 생성
            const roomUrl = `${window.location.origin}/room/${roomId}/`;

            // 방 링크 표시
            const roomLinkDiv = document.getElementById('room-link');
            roomLinkDiv.innerHTML = `<a href="${roomUrl}" target="_blank">Go to Room: ${roomId}</a>`;
        });
    </script>
</body>
</html>
