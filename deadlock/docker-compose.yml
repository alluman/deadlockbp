services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 deadlock.asgi:application
    volumes:
      - .:/app
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - redis

  nginx:
  image: nginx:latest
  volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf
    - ./staticfiles:/app/staticfiles 
  ports:
    - "80:80"
  depends_on:
    - web

  redis:
    image: redis:6
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  redis_data: